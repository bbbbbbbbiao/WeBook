version: '3.0'

services:
  # MySQL 8.0 服务
  mysql8:
    image: mysql:8.0.29  # 锁定具体版本，保证环境一致性
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root  # root 密码
    volumes:
      # 挂载初始化脚本，容器首次启动时自动执行
      - ./script/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      # 挂载 MySQL 数据目录（本地 ./data/mysql 对应容器内 /var/lib/mysql）
      - ./data/mysql:/var/lib/mysql
    ports:
      - "13316:3306"
    # 可选：限制容器资源使用
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G

  # Redis 服务（锁定 7.0 稳定版，支持 getdel 命令）
  redis:
    image: redis:7.0  # 替换为官方稳定版，优先兼容 getdel，新手更易适配
    restart: always
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    # 可选：添加 Redis 密码（如果项目需要，取消注释并修改密码）
    # - REDIS_PASSWORD=your_redis_password
    command: redis-server  # 启动 Redis 服务（默认配置，支持 RDB 持久化）
    volumes:
      # 挂载 Redis 数据目录（本地 ./data/redis 对应容器内 /data）
      - ./data/redis:/data
    ports:
      - "6379:6379"
    # 依赖 mysql8 服务，先启动 MySQL 再启动 Redis（提升启动稳定性）
    depends_on:
      - mysql8
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 512M

  # 远程配置中心
  etcd:
    image: 'quay.io/coreos/etcd:v3.5.14'
    environment:
      - ALLOW_NONE_AUTHENTICATION=yes
    ports:
      - "12379:2379"
      - "12380:2380"
    command:
      - /usr/local/bin/etcd
      - --name
      - etcd0
      - --listen-client-urls
      - http://0.0.0.0:2379
      - --advertise-client-urls
      - http://0.0.0.0:2379
      - --listen-peer-urls
      - http://0.0.0.0:2380
      - --initial-advertise-peer-urls
      - http://0.0.0.0:2380
      - --initial-cluster
      - etcd0=http://0.0.0.0:2380
      - --initial-cluster-token
      - etcd-cluster-1
      - --initial-cluster-state
      - new
